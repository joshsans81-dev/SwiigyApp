<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Clone - Home</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="header-container">
        <div class="left-header">
            <div class="logo-container">
                <a href="Index.html">
                    <img src="images/SWIGGY.NS.png" alt="Swiggy Logo" class="swiggy-logo">
                </a>
            </div>
            <div class="navbar">
                <ul>
                    <li><a href="Index.html">Home</a></li>
                    <li><a href="Restaurants.html">Restaurants</a></li>
                    <li><a href="cart.html">Cart 🛒</a></li>
                </ul>
            </div>
        </div>
        <button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>

    <div class="hero">
        <h1>Order Your Favorite Food 🍔</h1>
        <p>Choose Categories</p>
    </div>

    <div class="categories">
        <a href="Restaurants.html?filter=burger" class="category-card">
            <img src="images/vecteezy_ai-generated-burger-on-white-background-png_41271311.png" width="600px">
            <h2>Burgers</h2>
        </a>

        <a href="Restaurants.html?filter=pizza" class="category-card">
            <img src="images/vecteezy_pizza-isolated-on-transparent-background_52550719.png" width="600px">
            <h2>Pizza</h2>
        </a>

        <a href="Restaurants.html?filter=south" class="category-card">
            <img src="images/vecteezy_crispy-golden-masala-dosa-served-with-sambar-and-fresh-curry_68186173.png">
            <h2>South Indian</h2>
        </a>

        <a href="Restaurants.html?filter=north" class="category-card">
            <img src="images/vecteezy_an-indian-thali-with-different-types-of-food_55455015.png">
            <h2>North Indian</h2>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
